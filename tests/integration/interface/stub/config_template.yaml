AGENT_CONFIG: # Agent主配置
  name: "nl2sql_agent" # 名字（必选）
  description: "智能问数Agent" # Agent详细描述（可选）
  agent_type: "chatbi" # Agent类型（必选，chatbi）

MODEL:
  default_chat_model: # Agent使用的对话模型（必选）
    model_type: "chat" # api类型（可选，默认chat）
    provider: "bailian" # api供应平台（可选deepseek/openai/bailian/local，默认openai），应为单一值
    params:
      model: "deepseek-chat" # 模型名（必选）
      temperature: 0.7 # 温度（可选）
      base_url: "https://api.deepseek.com" # api地址（可选，除非官方url）
      api_key: "sk-1234567890" # api_key（与环境变量二选一，生产建议优先环境变量）
  default_embedding_model: # 记忆库使用的嵌入模型(可选)
    model_type: "embedding" # api类型（可选）

SCENARIO: # 场景约束说明（可选，作为底下prompt的追加）
  chat: # 上下文+推理控制
    instructions: "..." # 注入先验知识（非结构化）
    constraints: "..." # 推理输出格式要求

TOOLS: # 工具包（可选，场景已有内置工具）
  local_functions: # 本地工具
    - name: "tool_name"
      module: "工具导入路径"
      function: "工具签名"
  a2a: # a2a服务
    - name: "a2a_name"
      agent_id: "agent名称"
      url: "agent地址"
  mcp_servers: # MCP 服务
    - server_id: "mcp_name"
      transport_type: "stdio"
      config: {}
  skill: # skill工具服务
    - name: "skill_name"
      path: "skill路径"

HISTORY: # 历史上下文配置（可选）
  backend: "postgresql" # 后端类型
  url: "postgresql://user:password@127.0.0.1:5432/history_db" # 部署地址

KNOWLEDGE_BASE: # 知识库配置（可选，可以没有知识库）
  backend: "elasticsearch" # 后端类型
  scene: "ecommerce" # 知识库场景
  url: "http://127.0.0.1:9200" # 部署地址
  model: # 嵌入模型（向量化）
    base_url: "https://api.deepseek.com"
    api_key: "sk-1234567890"

METAVISOR: # 元数据增强（“chatbi”类型必选、其他类型可选）
  url: "8.92.9.151:31000" # 元数据查询服务ip/port，格式"x.x.x.x:port"
  scene: "ecommerce_prod" # 独立语义边界和数据资源作用域

ONTOLOGY: # 本体配置（可选）
  url: "8.92.9.151:32000" # 本体服务ip/port，格式"x.x.x.x:port"
  scene: "financial_ontology" # ontology scene example

