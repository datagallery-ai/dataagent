# DataAgent 默认配置（DeepAgent 引擎）
# from_config 加载优先级（后者覆盖前者）：
# 1. flex/flex_default_configs.yaml（本文件，提供默认值）
# 2. 用户指定的 yaml 配置文件
# 3. .env 环境变量配置（最高优先级）

AGENT_CONFIG:
  type: "react"
  max_iter: 15
  debug: false
  hierarchy: "MAIN"
  enable_human_feedback: false

# 工具配置
TOOLS: {}

# OpenJiuWen checkpoint storage. Configure "persistence" or "redis" for
# recovery after a process restart; in_memory preserves the default behavior.
CHECKPOINTER:
  type: "in_memory"
  conf: {}

# OpenJiuWen preset context processors. These legacy thresholds override only
# DialogueCompressor; all other processor settings use Jiuwen defaults.
CONTEXT:
  compress_token_limit: 32768
  compress_message_cnt: 200
