AGENT_CONFIG:
  name: "NL2SQL Agent"
  backend: "langgraph"
  type: "nl2sql"
MODEL:
  deepseek:
    model_type: "chat"
    provider: "bailian"
    params:
      model: "deepseek-v4-flash"
      temperature: 0.0
CORE:
  coordinator: {}
  perceptor:
    user_schema: "schema_zdy"
    user_evidence: "udf_zdy"
    user_sql_rules: "sql_rules_zdy"
  generator:
    strategies: ["prompt"]
    num_samples: 1
  validator: {}
  reflector: {}
DATABASE:
  engine: "hive"
