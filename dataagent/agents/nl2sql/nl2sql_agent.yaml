AGENT_CONFIG:
  name: "NL2SQL Agent"
  backend: "langgraph"
  type: "nl2sql"
MODEL:
  deepseek:
    model_type: "chat"
    provider: "bailian"
    params:
      model: "deepseek-v4-flash"
      temperature: 0.0
CORE:
  coordinator: {}
  perceptor:
    user_schema: null  # name of .md file under templates/nl2sql/perceptor/
    user_evidence: null
    user_sql_rules: "sql_rules_bird"
    user_few_shot_examples: null
  generator:
    strategies: ["prompt"]  # "prompt", "icl", "skeleton", "dc"
    num_workers: 1  # parallelization for each strategy
    num_samples: 3  # number of SQLs to generate in "prompt" strategy
  validator:
    db_explain: true
    keyword_match: false
    metadata_match: false
  reflector:
    threshold: 0.9
  executor:
    limit: -1  # all
    preview_limit: 5
  selector:
    threshold: 0.9
DATABASE:
  db_id: "superhero"
  engine: "sqlite"  # "sqlite", "mysql", "hive", "postgres"
  config:
    path: ""  # replace with actual superhero.sqlite path
SEMANTIC_LAYER:
  base_url: "http://{hostip}:{port}"  # 可填服务根地址；客户端会统一到 /api/semantic/v1
  username: null                       # 未启用认证时保持 null；启用认证时填写
  password: null                       # 未启用认证时保持 null；启用认证时填写
  timeout: 30                           # 可按服务端表数量和响应耗时调整
  verify_ssl: false                    # 测试/自签证书环境可关闭；生产环境建议开启
