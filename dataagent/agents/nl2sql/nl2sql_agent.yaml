AGENT_CONFIG:
  name: "NL2SQL Agent"
  backend: "langgraph"
  type: "nl2sql"
MODEL:
  deepseek:
    model_type: "chat"
    provider: "deepseek"
    params:
      model: "deepseek-v4-flash"
      temperature: 0.0
CORE:
  perceptor:
    user_schema: null  # name of .md file under templates/nl2sql/user/
    user_evidence: null
    user_sql_rules: "sql_rules_bird"
    user_few_shot_examples: null
  generator:
    strategies: ["prompt"]  # "prompt", "icl", "skeleton", "dc"
    num_workers: 1  # parallelization for each strategy
    num_samples: 1  # number of SQLs to generate in "prompt" strategy
  validator:
    read_only: true  # allow only read-only queries
    db_explain: true
    keyword_match: false
    metadata_match: false
  reflector:
    threshold: 0.9
    ref_retries: 2
  executor:
    limit: -1  # all
    preview_limit: 5
  selector:
    threshold: 0.9
    sel_retries: 1
DATABASE:
  db_id: ""
  engine: "sqlite"  # "sqlite", "mysql", "hive", "postgres"
  config:
    path: ""  # replace with actual .sqlite path
SEMANTIC_LAYER:
  base_url: ""  # replace with actual semantic service port
  username: null
  password: null
  timeout: 30
  verify_ssl: false
