AGENT_CONFIG:
  name: "NL2SQL Agent"
  backend: "langgraph"
  type: "nl2sql"
MODEL:
  chat_model:
    model_type: "chat"
    provider: "bailian"
    params:
      model: "qwen3-30b-a3b"
      temperature: 0.0
CORE:
  perceptor:
    user_sql_rules: "sql_rules_udn"
  generator:
    strategies: ["prompt"]
  validator:
    db_explain: false
    keyword_match: false
    metadata_match: false
  reflector:
    threshold: 0.9
DATABASE:
  db_id: "udn"
  engine: "postgres"
  sql_service_engine: "udn"
  config:
    path: ""
    explain_url: "http://"
SEMANTIC_LAYER:
  base_url: "http://"  # 可填服务根地址；客户端会统一到 /api/semantic/v1
  username: null                       # 未启用认证时保持 null；启用认证时填写
  password: null                       # 未启用认证时保持 null；启用认证时填写
  timeout: 30                           # 可按服务端表数量和响应耗时调整
  verify_ssl: false                    # 测试/自签证书环境可关闭；生产环境建议开启
  udn:
    table_selection:
      mode: "business_family"
      llm_topk: 4
