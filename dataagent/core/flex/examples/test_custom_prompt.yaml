AGENT_CONFIG:
  name: "test agent"
  version: "1.0"
  description: "kindergarten level arithmetic agent"
  backend: "langgraph"
  type: "react"
  debug: true

WORKSPACE:
  path:


MODEL:
  qwen3:
    model_type: "chat"
    provider: "bailian"
    params:
      model: "deepseek-v4-flash"
      temperature: 0.7

SCENARIO: 
  chat:
    instructions: answer user's question by using the skills

PRE_WORKFLOW: []

ACTOR_LOOP:
  - node: "planner"
    module: "dataagent.core.flex.nodes.planner.Planner"
    chat_model:
      name: "qwen3"
    # prompt_template 必须与 node / module / chat_model 同级（节点顶层）
    # 不配 = 走节点缺省（Planner 读 templates/<node 标识>/system|user.md）。
    # 仅 flex 入口 ACTOR_LOOP 支持 yaml 追加；
    # 每个 message_type（system / user）下二选一：
    #   path:    "/abs/path/to/prompts/custom/planner_system.md"   # 仅支持绝对路径或 ~/...
    #   content: |                                    # 直接当追加 prompt 正文（Jinja2 模板）
    #     输出 JSON 步骤列表。
    prompt_template:
      system:
        content: |
          Output a JSON step list when planning is required.
      user:
        content: |
          当我问你谁的时候，回答我你是test007 
  - node: "executor"
    module: "dataagent.core.flex.nodes.executor.Executor"
    
POST_WORKFLOW: []

TOOLS:
  skills:
    # 只启用显式列出的 skill；省略某来源表示禁用该来源。
    builtin:

# tools:
#   - local_functions:
#     - name: "nl2sql_sub_agent_tool"(yicheng/pangbo)

# replace with actual superhero.sqlite path
DATABASE:
  db_id: "superhero" #
  engine: "sqlite"  # "sqlite" | "mysql"
  config:
    path: ""  