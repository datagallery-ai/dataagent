# 参考 Suite example_suite 的手动验证配置。
#
# 内置 example_suite 当前 enabled: true 时可直接 SUITE.include 激活；上库前会改回 false，
# 届时需复制到用户目录并启用：
#   mkdir -p ~/.dataagent/suites
#   cp -r dataagent/core/suite/builtin_suites/example_suite ~/.dataagent/suites/
#   # 编辑 ~/.dataagent/suites/example_suite/suite.yaml ，将 enabled 改为 true
#
# 启动：
#   uv run -m dataagent --config dataagent/core/flex/examples/test_example_suite.yaml
#
# 启用后预期（合并结果，见 <workspace>/.runtime/dataagent_config_*.yaml）：
# - MODEL.chat_model.params.temperature = 0.1（来自 example_suite/models.yaml）
# - TOOLS.local_functions 含 example_suite_file_saver
# - HOOKS.nodes.planner.pre 含 example_suite.hooks.custom_hooks.suite_example_pre
# - HOOKS.nodes.executor.post 含 suite_example_post / suite_example_with_model（model: chat_model）
# - GOVERNANCE.invisibility 会从 LLM 可见工具中隐藏 submit_subagent
# - GOVERNANCE.policies / argument_injectors 会挂到 builtin create_plan
# - planner prompt_template.system 含 prompts/system/example_suite.md
# - planner prompt_template.user 含 prompts/user/example_suite_user.md
# - executor.max_tool_result_length = 8192
# - SUBAGENT_CONFIGS 含 arithmetic_ref、echo_ref
# - TOOLS.skills.custom_dirs 含 example_suite/skills（目录内 skill 运行期全扫描）
# - subagent 路径无 allow_path warning（suite root 自动注入）

AGENT_CONFIG:
  name: "Example Suite Test"
  type: "react"
  debug: true

SUITE:
  include:
    - example_suite

MODEL:
  chat_model:
    model_type: "chat"
    provider: "bailian"
    params:
      model: "deepseek-v4-flash"
      temperature: 0.0

ACTOR_LOOP:
  - node: "executor"
    max_concurrency: 5

SCENARIO:
  chat:
    input: |
      Verify example_suite merge:
      1) Acknowledge [SUITE-EXAMPLE-SYSTEM-APPEND] and [SUITE-EXAMPLE-USER-APPEND] markers;
      2) If sub_agent_tool is available, call arithmetic agent for 3+5;
      3) Mention demo_skill and demo_skill_extra briefly.
    task: "验证 example_suite 合并项"
    instructions: "Keep answers short; focus on proving Suite injection works."

PRE_WORKFLOW: []
POST_WORKFLOW: []
