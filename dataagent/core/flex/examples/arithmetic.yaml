AGENT_CONFIG:
  name: "arithmetic agent"
  version: "1.0"
  description: "kindergarten level arithmetic agent"
  backend: "langgraph"
  type: "react"
  debug: true

MODEL:
  chat_model:
    model_type: "chat"
    provider: "bailian"
    params:
      model: "deepseek-v4-flash"
      temperature: 0.7

SCENARIO: 
  chat:
    input: an arithmetic question
    task: answer user's question
    instructions: Only use tools for calculation, do NOT calculate by yourself
    output_format: The final calculation result, no extra text

ENV:
  - module: "dataagent.actions.gym.ArithmeticEnv"

PRE_WORKFLOW: []
    
POST_WORKFLOW: []