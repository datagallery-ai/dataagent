AGENT_CONFIG:
  name: "nl2sql sub agent"
  version: "1.0"
  description: "SQLite-backed NL2SQL sub-agent"
  backend: "langgraph"
  type: "react"
  debug: true

MODEL:
  qwen3:
    model_type: "chat"
    provider: "bailian"
    params:
      model: "deepseek-v4-flash"
      temperature: 0.0

ENV:
  - module: "dataagent.actions.gym.SQLiteEnv"

ACTOR_LOOP:
  - node: "nl2sql_react"
    module: "dataagent.core.flex.nodes.planner.Planner"
    chat_model:
      name: "qwen3"

  - node: "executor"
    module: "dataagent.core.flex.nodes.executor.Executor"
    max_concurrency: 5

TOOLS:
  builtin: []

DATABASE:
  config:
    path: "" # sqlite file path
