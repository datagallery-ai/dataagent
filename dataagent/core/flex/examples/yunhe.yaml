AGENT_CONFIG:
  name: "NL2SQL Agent"
  backend: "langgraph"
  type: "nl2sql"
MODEL:
  qwen3_coder:
    model_type: "chat"
    provider: "bailian"
    params:
      model: "deepseek-v4-flash"
      temperature: 0.0

DATABASE:
  db_id: "udn" # UEG useless
  engine: "postgres" # UEG useless
  sql_service_engine: "udn" # UEG useless
  config:
    path: ""  # replace with actual sqlite path

SEMANTIC_LAYER:
  base_url: "http://{hostip}:{port}"  # 可填服务根地址；客户端会统一到 /api/semantic/v1
  username: null                       # 未启用认证时保持 null；启用认证时填写
  password: null                       # 未启用认证时保持 null；启用认证时填写
  timeout: 30                           # 可按服务端表数量和响应耗时调整
  verify_ssl: false                    # 测试/自签证书环境可关闭；生产环境建议开启
