AGENT_CONFIG:
  name: "Agent"
  version: "1.0"
  description: "Agent"
  backend: "langgraph"
  type: "react"

MODEL:
  chat_model:
    model_type: "chat"
    provider: "bailian"
    params:
      model: "deepseek-v4-flash"
      temperature: 0.7

SCENARIO: 
  chat:
    instructions: 当你即将使用sub_agent_tool工具时，如果当前会话有相关的subagent历史运行记录，请优先复用该子agent来完成任务。

SUBAGENT_CONFIGS:
  - path: "$env{PWD}/dataagent/core/flex/examples/arithmetic.yaml"

SWARM:
  enable: true
  worker_max_concurrent: 2

WORKSPACE:
  allow_path:
    # allow_path 校验须为绝对路径；用 $env{PWD} 拼接仓库内路径，换机器时在仓库根目录启动即可（与相对仓库根一致）。
    - "$env{PWD}/dataagent/core/flex/examples"
