AGENT_CONFIG:
  name: "NL2SQL Flex Subagent Launcher"
  type: "react"
  backend: "langgraph"
  debug: true

MODEL:
  chat_model:
    model_type: "chat"
    provider: "bailian"
    params:
      model: "deepseek-v4-flash"
      temperature: 0.0

SCENARIO:
  chat:
    input: "nl2sql question"
    task: "launch nl2sql as a sub agent and return DONE"
    instructions: |
      完成数据分析任务，如果需要执行sql查询，则调用`nl2sql_sub_agent_tool`工具。
    output_format: "DONE"

TOOLS:
  local_functions:
    - module: "dataagent.actions.tools.local_tool.tools"
      function: "nl2sql_sub_agent_tool"
      config:
        llm_model: chat_model

PRE_WORKFLOW: []
POST_WORKFLOW: []

DATABASE:
  db_id: "superhero"
  engine: "sqlite"
  config:
    path: ""

METAVISOR:
  metavisor_url: "http://8.92.9.151:41000"
  valuematch_url: "http://8.92.9.151:8000"

SWARM:
  enable: false
