AGENT_CONFIG:
  name: "NL2SQL Flex Subagent Launcher"
  type: "react"
  backend: "langgraph"
  debug: true

MODEL:
  chat_model:
    model_type: "chat"
    provider: "bailian"
    params:
      model: "deepseek-v4-flash"
      temperature: 0.0

SCENARIO:
  chat:
    input: "nl2sql question"
    task: "launch nl2sql as a sub agent and return DONE"
    instructions: |
      完成数据分析任务，如果需要执行sql查询，则调用`nl2sql_sub_agent_tool`工具。
    output_format: "DONE"

TOOLS:
  local_functions:
    - module: "dataagent.actions.tools.local_tool.tools"
      function: "nl2sql_sub_agent_tool"
      config:
        llm_model: chat_model
        core_config:
          perceptor:
            user_sql_rules: null
            user_few_shot_examples: null
          generator:
            strategies: ["prompt"]
            num_samples: 1

PRE_WORKFLOW: []
POST_WORKFLOW: []

DATABASE:
  db_id: "superhero"
  engine: "sqlite"
  config:
    path: ""

SEMANTIC_LAYER:
  base_url: "http://{hostip}:{port}"  # 可填服务根地址；客户端会统一到 /api/semantic/v1
  username: null                       # 未启用认证时保持 null；启用认证时填写
  password: null                       # 未启用认证时保持 null；启用认证时填写
  timeout: 30                           # 可按服务端表数量和响应耗时调整
  verify_ssl: false                    # 测试/自签证书环境可关闭；生产环境建议开启

SWARM:
  enable: false
