# =============================================================================
# subagents/*.yaml — 子 Agent 完整配置（见 arithmetic_ref.yaml 顶部说明）
# =============================================================================

AGENT_CONFIG:
  name: "echo agent"
  version: "1.0"
  description: "echo user input briefly (example_suite second subagent catalog entry)"
  backend: "langgraph"
  type: "react"
  debug: true

MODEL:
  chat_model:
    model_type: "chat"
    provider: "bailian"
    params:
      model: "deepseek-v4-flash"
      temperature: 0.0

SCENARIO:
  chat:
    input: a short message to echo
    task: echo the user message
    instructions: repeat the user message in one short sentence

PRE_WORKFLOW: []
POST_WORKFLOW: []

ACTOR_LOOP:
  - node: "planner"
    module: "dataagent.core.flex.nodes.planner.Planner"
    chat_model:
      name: "chat_model"
  - node: "executor"
    module: "dataagent.core.flex.nodes.executor.Executor"
