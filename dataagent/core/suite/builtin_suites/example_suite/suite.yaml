# =============================================================================
# suite.yaml — Suite 包根目录元数据（整个 Suite 目录下唯一必填文件）
# =============================================================================
# 放置位置：<suite_root>/suite.yaml
# 激活条件：用户 YAML 的 SUITE.include 列出本 name，且 enabled 为 true（或被用户目录同名覆盖）。
# =============================================================================

# 【必填】Suite 全局唯一标识；须为合法 Python 标识符（用作 Hook 合并后的 import 前缀
name: example_suite

# 【选填】语义化版本；预留版本管理功能
version: "0.1.0"

# 【选填】展示名称
display_name: "Example Suite (reference template)"

# 【选填】说明文本
description: >
  内置参考 Suite 模板（core/suite/builtin_suites/example_suite）。
  目录约定（除 suite.yaml 外均可选）：
  suite.yaml【必填】| models.yaml | tools/tools.yaml | hooks/hooks.yaml+hooks/*.py |
  prompts/system/* + prompts/user/* | skills/<name>/SKILL.md | subagents/*.yaml | node_configs.yaml。
  skills/ 合并为 TOOLS.skills.custom_dirs；合并后 skill name 全局唯一校验。
  先初始化 agent ，调用chat 或 astream 后，即可在以下路径找到合并后的配置，每轮对话存储一次：<workspace>/.runtime/dataagent_config_*.yaml。

# 【选填】合并优先级，数值越大越优先（默认 0）；同 priority 按 name 字母序决定 list 顺序
priority: 50

# 【选填】是否与 SUITE.include 共同决定激活
enabled: false

# 【选填】依赖的其他 Suite name 列表；被依赖 Suite 须已激活
# 示例：requires: ["suite_name1", "suite_name2"]
requires: []

# 【选填】互斥 Suite name 列表；与其中任一同时激活则 reload 报错
# 示例：conflicts: ["suite_name3", "suite_name4"]
conflicts: []
