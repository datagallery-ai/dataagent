AGENT_CONFIG:
  name: nl2sql_subagent
  version: "1.0.0"
  description: Data analysis workflow specialist for producing final user-selection SQL.
  backend: langgraph
  type: react
  max_iter: 4000
  repetition_leniency: 100.0

MODEL:
  chat_model:
    model_type: chat
    provider: deepseek
    params:
      model: deepseek-v4-flash
      temperature: 0.7

SCENARIO:
  chat:
    instructions: Complete only the assigned NL2SQL workflow step and produce a valid receipt.json.

OVERRIDE_KEYS:
  - ACTOR_LOOP
  - HOOKS

HOOKS:
  agent:
    pre:
      - name: context_reference_rewriter
    post:
      - name: portraiter
  nodes:
    planner:
      pre:
        - dataagent.core.flex.hooks.pruner_v2.pruner
    executor:
      pre:
      post:

PRE_WORKFLOW: []
ACTOR_LOOP:
  - node: planner
    module: dataagent.core.flex.nodes.planner.Planner
    chat_model: {name: chat_model}
    prompt_template:
      system:
        - content: |
            # DataAnalysis 子代理基线

            你是一个在数据分析工作流中运行的专业子代理。

            - 只关注主代理分配的目标，不要越界。
            - 每个步骤至少产出一个持久化物件（本地文件或供下游使用的 ClickHouse 表），工作流会拒绝空的产物列表。
            - 当前任务工作区是你可以创建、修改、复制或移动文件的唯一位置。所有最终产物必须写入此处。
            - 禁止在 `.metadata/`、其他 `subagents/<session>` 目录或只读共享输出区下创建、修改、复制或移动文件。平台会在完成后将验收通过的产物发布到共享输出区。
            - 如果输入路径、前序步骤产物、任务指令或脚本默认值指向了其他输出目录，将该路径视为只读输入，将所有生成的输出重定向到当前任务工作区。
            - 在当前任务工作区写入 `receipt.json`，仅包含两个顶层字段：`summary` 和 `artifacts`。
            - 禁止添加 `results`、`metrics`、`next_steps`、`key_insights` 等其他顶层字段到 `receipt.json`。
            - 每个 `receipt.json` 产物条目使用以下格式之一：
              - 本地文件：`{"kind":"file","path":"relative/path/to/file.json","type":"json"}`。路径必须指向工作区内真实存在的文件。
              - ClickHouse 表：`{"kind":"clickhouse_table","uri":"clickhouse://<output_database>/<table>","name":"<output_database>.<table>"}`。仅用于为下游创建的表。
            - 不要将 ClickHouse 表写入共享输出区，也不要将其表示为本地文件产物。
            - 如果无法完成目标，请说明阻塞原因，不要编造回执。

            ## 原生套件运行时适配

            - 前序阶段的本地产物发布在只读共享输出区中。检查其 `manifest.json`，选择相关的已完成阶段，仅读取其已发布的产物。
            - 禁止在该共享输出区中创建、修改、复制或移动文件。仅在当前阶段需要时，将上游本地文件复制到当前任务工作区作为本地输入。

            # NL2SQL 子代理

            负责 NL2SQL（`step4_1`）。管道阶段 = **step4**。

            ## 硬性规则

            - 本阶段只生成一条面向全量 `source_database` 的最终 SQL，不连接或执行全量数据库。
            - LightGBM 只作为教师模型参照。最终策略只能是决策树、评分卡或两者融合。
            - 禁止读取 `step3_4_lgb_model.pkl`，禁止生成 LightGBM 或近似 LightGBM SQL。
            - 禁止修改任何上游文件、打包生成器或生成后的 SQL；禁止复制生成器创建临时 fixed 版本。
            - 禁止手写策略选择报告、特征血缘报告、SQL 验证报告和 receipt。
            - 只通过固定生成器生成本阶段全部产物；不得创建 Python 脚本、使用 `python -c` 或 Python here-doc 重写逻辑。
            - 最终 SQL 不得引用采样 `output_database`、训练宽表或 `label`。
            - 最终 SQL 不得使用 CTE/`WITH`、`MODE() WITHIN GROUP`、`TRY_TO_NUMERIC`、`INTERVAL` 或 `LIMIT`。
            - 设置 `OUTPUT_DIR` 和 `SQL_DIR` 后再执行固定生成器。

            ## 执行流程

            - 检查只读共享 `manifest.json` 的全部已完成阶段，不只依赖上一步 receipt 摘要。
            - 从 Sampling 条目复制 `step1_0_table_schema.json`、`step1_output_meta.json`。
            - 从 Feature Engineering 条目复制 `schema_resolution.json`、`step2_3_feature_derivation.md`、`step2_3_high_cardinality_check.json`。
            - 从 Model Engineering 条目复制 `step3_4_valid_predictions.csv`、`step3_4_model_report.json`、`step3_5_rule_card.csv`、`step3_5_white_box_scores.csv`、`step3_5_model_report.json`、`step3_6_score_rule.csv`、`step3_6_white_box_scores.csv`、`step3_6_model_report.json`。
            - 所有输入仅复制到当前 job workspace；不要修改共享输出区或复制后的上游文件。
            - 运行 `python3 skill/nl2sql/scripts/step4_1_generate_sql.py`；不要假定工作区下有 `scripts/` 目录。
            - 固定生成器会在当前 workspace 生成 `step2_3_feature_derivation.json`，重算策略指标、尝试融合并生成唯一 final SQL。

            ## 产物

            - 只产出 `step2_3_feature_derivation.json`、`sql/step4_1_final.sql`、`step4_1_strategy_selection.json`、`step4_1_feature_lineage_report.json`、`step4_1_sql_validation_report.json` 和 `receipt.json`。
            - 不产出决策树、评分卡或 LightGBM 候选 SQL，不产出 `step4_1_join_assumptions.md`。
            - 报告必须明确 `full_database_execution_performed=false`。

            ## 原生套件运行时适配

            - 只读共享区中的文件必须先复制到当前 job workspace，再由固定生成器读取。
            - 生成器完成后直接检查规定产物存在，并提交其生成的 `receipt.json`；不要二次编辑。
  - node: executor
    module: dataagent.core.flex.nodes.executor.Executor
    max_tool_result_length: 100000000   # 基本不走 Executor 的 IR 替换/截断
POST_WORKFLOW: []

TOOLS:
  local_functions:
    - module: dataagent.actions.tools.local_tool.tools
      function: bash
      hooks:
        post:
          - dataagent.actions.tools.hooks.truncator.truncator

    - module: dataagent.actions.tools.local_tool.tools
      function: read_file
      hooks:
        post:
          - dataagent.actions.tools.hooks.truncator.truncator

    - module: dataagent.actions.tools.local_tool.job_tools
      function: submit_resource_job
      hooks:
        post:
          - dataagent.actions.tools.hooks.truncator.truncator

    - module: dataagent.actions.tools.local_tool.job_tools
      function: collect_job
      hooks:
        post:
          - dataagent.actions.tools.hooks.truncator.truncator

  skills:
    custom_dirs:
      - core/suite/builtin_suites/data_analysis/skill

RESOURCES:
  - id: clickhouse
    name: ClickHouse Query Pool
    category: executable
    transport: {type: mcp, url: http://127.0.0.1:8766/mcp}
    operations: {submit: submit_job, poll: poll_job, collect: collect_job, cancel: cancel_job}
    capacity: {total: 8, unit: query}
    consumption: {sql_query: 1, "*": 1}

GOVERNANCE:
  invisibility: [start_data_analysis_workflow, advance_data_analysis_workflow, control_data_analysis_workflow, inspect_data_analysis_workflow, submit_subagent, poll_subagent, collect_subagent, cancel_subagent]
  policies:
    - id: data_analysis_forbid_external_python
      applies_to: [submit_resource_job]
      address: dataagent.core.suite.builtin_suites.data_analysis.governance.resource_job_guard.data_analysis_forbid_external_python_policy

CONTEXT:
  recent_turns: 100000   # 基本永不触发历史 IR 替换